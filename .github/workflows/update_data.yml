name: Update MLB Data

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pybaseball requests pandas beautifulsoup4

      - name: Run data generator
        run: python generate_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json .last_update
          git diff --staged --quiet || git commit -m "Auto-update data.json $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force origin main
