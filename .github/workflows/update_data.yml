name: Update MLB Data

on:
  schedule:
    # Runs at 11:00 AM ET (15:00 UTC) every day — after probable pitchers are posted
    - cron: '0 15 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pybaseball requests pandas

      - name: Run data generator
        run: python generate_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update data.json $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
